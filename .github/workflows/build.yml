name: Build

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            ext: ""
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            ext: ""
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"
          cache: true
      - name: Prepare build metadata
        id: meta
        shell: bash
        run: |
          version="${GITHUB_REF_NAME//\//-}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            version="ci-${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist out
          binary_name="sonolus-notgarupa-server-${{ steps.meta.outputs.version }}-${{ matrix.suffix }}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "out/${binary_name}" .
          case "${{ matrix.goos }}" in
            linux|darwin)
              tar -czf "dist/sonolus-notgarupa-server-${{ steps.meta.outputs.version }}-${{ matrix.suffix }}.tar.gz" -C out "${binary_name}"
              ;;
            *)
              cp "out/${binary_name}" "dist/${binary_name}"
              ;;
          esac
      - uses: actions/upload-artifact@v4
        with:
          name: sonolus-notgarupa-server-${{ steps.meta.outputs.version }}-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
